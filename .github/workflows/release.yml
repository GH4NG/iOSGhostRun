name: Release
on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag'
                required: true
                type: string

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.platform }}-${{ matrix.arch }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux AMD64 build
                    - os: ubuntu-24.04
                      platform: linux
                      arch: amd64

                    # Linux ARM64 build
                    - os: ubuntu-24.04-arm
                      platform: linux
                      arch: arm64

                    # Windows AMD64 build
                    - os: windows-latest
                      platform: windows
                      arch: amd64

                    # Windows ARM64 build
                    - os: windows-11-arm
                      platform: windows
                      arch: arm64

                    # macOS Universal build
                    - os: macos-latest
                      platform: darwin
                      arch: universal

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: 'stable' # Latest stable version

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 'latest'

            - name: Install Dependencies
              if: matrix.platform == 'linux'
              run: |
                  sudo apt update
                  sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

            - name: Install Wails CLI
              run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Build
              run: |
                  if [ "${{ matrix.platform }}" = "linux" ]; then
                    wails3 task linux:create:appimage
                  elif [ "${{ matrix.platform }}" = "windows" ]; then
                    wails3 build
                  elif [ "${{ matrix.platform }}" = "darwin" ]; then
                    wails3 task darwin:package:universal
                    zip -j bin/iOSGhostRun-macos-universal.zip bin/iOSGhostRun.app
                  else
                    echo "Unsupported platform: ${{ matrix.platform }}"
                    exit 1
                  fi
              shell: bash

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-${{ matrix.platform }}-${{ matrix.arch }}
                  path: bin/
